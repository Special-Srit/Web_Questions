<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  
  .form-box {
    background: #f8eeee;
    padding: 40px;
    border-radius: 12px;
    width: 400px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  
  h2 { text-align: center; margin-bottom: 24px; }
  
  .field { margin-bottom: 16px; }
  
  label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
  
  .required { color: red; }
  
  input {
    width: 100%; padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
  }
  
  input:focus { outline: none; border-color: #4A90E2; }
  
  button {
    width: 100%; padding: 12px;
    background: #4A90E2;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  
  button:hover { background: #2c6fbc; }
</style>
</head>
<body>
<div class="form-box">
  <h2>회원가입</h2>
  <form>
    <div class="field">
      <label>이름 <span class="required">*</span></label>
      <input type="text" placeholder="이름 입력" required>
    </div>
    <div class="field">
      <label>이메일 <span class="required">*</span></label>
      <input type="email" placeholder="이메일 입력" required>
    </div>
    <div class="field">
      <label>비밀번호 <span class="required">*</span></label>
      <input type="password" placeholder="비밀번호 입력" required>
    </div>
    <div class="field">
      <label>비밀번호 확인 <span class="required">*</span></label>
      <input type="password" placeholder="비밀번호 재입력" required>
    </div>
    <button type="submit">회원가입</button>
  </form>
</div>
</body>
</html>
