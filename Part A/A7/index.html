<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        background-color: #f8f9fb;
    }
    .head{
        margin-top: auto;
        margin-bottom: 0px;
        justify-content: center;
        align-items: center;
        display: flex;
    }
    .card{
        width: 250px;
        height: 230px;
        border-radius: 15px;
        background-color: white;
        justify-content: center;
        align-items: center;
        margin: auto;
    }
    p{
        background-color: white;
        justify-content: center;
        align-items: center;
        display: flex;
        color: #b2babc;
    }
    .icon{
        font-size: xx-large;
        margin-bottom: 0px;
    }
    .headers{
        font-weight: bold;
        color: #343231;
        font-size: larger;
        margin-bottom: 0px;
    }
    button{
        width: 100px;
        height: 35px;
        display: flex;
        margin: auto;
        background-color: #0079fe;
        border-style: none;
        border-radius: 16px;
        justify-content: center;
        align-items: center;
    }
</style>
<body>
    <div class="head" style="display: flex;">
        <h1>우리의 서비스</h1>
    </div>
    <div style="display: flex;">
        <div class="card">
            <p class="icon">🏆</p>
            <p class="headers">기능경기대회</p>
            <p style="font-size: x-small; margin: auto; padding: 15px; text-align: center;">국내외 기능경기대회를 통해 기능인재를 발굴하고 우수한 기능의 가치를 널리 알리고 있습니다.</p>
            <button><p style="background-color: #0079fe; font-weight: 500; color: white;">자세히 보기</p></button>
        </div>
    </div>
</body>
</html>
